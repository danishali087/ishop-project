<!DOCTYPE html>

<html lang="en">

<head>

<title>Ishop Register</title>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet"
      href="../node_modules/bootstrap/dist/css/bootstrap.css">

<link rel="stylesheet"
      href="../node_modules/bootstrap-icons/font/bootstrap-icons.css">

<script src="../node_modules/jquery/dist/jquery.js"></script>


</head>

<body class="container-fluid bg-light">

<div class="row justify-content-center mt-5">

    <div class="col-4">

        <div class="card shadow-lg">

            <div class="card-header text-center bg-dark text-white">

                <h3>
                    <span class="bi bi-person-plus-fill"></span>
                    Customer Register
                </h3>

            </div>

            <div class="card-body">

                <div class="mb-3">

                    <label class="form-label">
                        User Id
                    </label>

                    <input type="text"
                           id="UserId"
                           class="form-control">

                </div>


                <div class="mb-3">

                    <label class="form-label">
                        User Name
                    </label>

                    <input type="text"
                           id="UserName"
                           class="form-control">

                </div>


                <div class="mb-3">

                    <label class="form-label">
                        Password
                    </label>

                    <input type="password"
                           id="Password"
                           class="form-control">

                </div>


                <div class="mb-3">

                    <label class="form-label">
                        Age
                    </label>

                    <input type="number"
                           id="Age"
                           class="form-control">

                </div>


                <div class="mb-3">

                    <label class="form-label">
                        Email
                    </label>

                    <input type="email"
                           id="Email"
                           class="form-control">

                </div>


                <div class="mb-3">

                    <label class="form-label">
                        Mobile
                    </label>

                    <input type="text"
                           id="Mobile"
                           class="form-control">

                </div>

            </div>

            <div class="card-footer">

                <div class="card-footer">

                    
                    <button class="btn btn-primary w-100"
                            id="btnRegister">
                    
                        Register
                    
                    </button>
                    
                    <div class="text-center mt-3">
                    
                        <a href="login.html"
                           class="text-decoration-none">
                    
                            Already have account ? Login
                    
                        </a>
                    
                    </div>
                    
                    
                    </div>
                    

        </div>

    </div>

</div>


<script>

$(function(){

    $("#btnRegister").click(function(){

        var customer = {

            UserId: $("#UserId").val(),
            UserName: $("#UserName").val(),
            Password: $("#Password").val(),
            Age: $("#Age").val(),
            Email: $("#Email").val(),
            Mobile: $("#Mobile").val()

        };

        $.ajax({

            method: "POST",

            url: "http://localhost:4400/registercustomer",

            data: customer,

            success: function(msg){

                alert(msg);

                location.reload();

            },

            error: function(){

                alert("Unable to Register");

            }

        });

    });

});

</script>

</body>

</html>
