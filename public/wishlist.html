<!DOCTYPE html>
<html lang="en">

<head>

    <title>My Wishlist</title>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="stylesheet"
          href="../node_modules/bootstrap/dist/css/bootstrap.css">

    <link rel="stylesheet"
          href="../node_modules/bootstrap-icons/font/bootstrap-icons.css">

    <script src="../node_modules/jquery/dist/jquery.js"></script>

    <style>

        body {
            background-color: #eaeded;
        }

        .wish-image {
            height: 120px;
            object-fit: contain;
        }

    </style>

</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-dark px-4">

    <a class="navbar-brand">
        <span class="bi bi-heart"></span>
        My Wishlist
    </a>

    <div>
        <a href="products.html" class="btn btn-warning me-2">
            Continue Shopping
        </a>
        <a href="cart.html" class="btn btn-warning position-relative">
            <span class="bi bi-cart3"></span>
            Cart
            <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger"
                  id="cartCount">0</span>
        </a>
    </div>

</nav>


<!-- WISHLIST ITEMS -->
<div class="container mt-4">

    <h4 class="mb-4">
        <span class="bi bi-heart-fill text-danger"></span>
        My Wishlist
    </h4>

    <div id="wishlistItems">
        <!-- LOADED BY SCRIPT -->
    </div>

</div>


<script>

$(function(){

    // LOAD CART COUNT
    var cartItems = [];

    if(localStorage.getItem("cart") != null){
        cartItems = JSON.parse(localStorage.getItem("cart"));
        $("#cartCount").html(cartItems.length);
    }


    // LOAD WISHLIST
    var wishlist = [];

    if(localStorage.getItem("wishlist") != null){
        wishlist = JSON.parse(localStorage.getItem("wishlist"));
        LoadWishlist();
    } else {
        ShowEmpty();
    }


    // LOAD WISHLIST FUNCTION
    function LoadWishlist(){

        $("#wishlistItems").html("");

        if(wishlist.length == 0){
            ShowEmpty();
            return;
        }

        wishlist.forEach(function(product, index){

            var item = `

                <div class="card mb-3 shadow-sm">

                    <div class="row g-0">

                        <div class="col-2 text-center">
                            <img src="${product.image}"
                                 class="img-fluid wish-image p-3">
                        </div>

                        <div class="col-10">
                            <div class="card-body">

                                <h5>${product.title}</h5>

                                <p class="text-muted text-capitalize">
                                    ${product.category}
                                </p>

                                <h4 class="text-danger">
                                    ₹ ${product.price}
                                </h4>

                                <div class="d-flex gap-2 mt-3">

                                    <!-- MOVE TO CART -->
                                    <button class="btn btn-warning"
                                            onclick="MoveToCart(${index})">
                                        <span class="bi bi-cart-plus"></span>
                                        Move to Cart
                                    </button>

                                    <!-- REMOVE FROM WISHLIST -->
                                    <button class="btn btn-danger"
                                            onclick="RemoveWishlist(${index})">
                                        <span class="bi bi-trash"></span>
                                        Remove
                                    </button>

                                </div>

                            </div>
                        </div>

                    </div>

                </div>

            `;

            $("#wishlistItems").append(item);

        });

    }


    // SHOW EMPTY MESSAGE
    function ShowEmpty(){
        $("#wishlistItems").html(`
            <div class="text-center mt-5">
                <h4 class="text-muted">Your Wishlist is Empty</h4>
                <a href="products.html" class="btn btn-warning mt-3">
                    Browse Products
                </a>
            </div>
        `);
    }


    // MOVE TO CART FUNCTION
    window.MoveToCart = function(index){

        var product = wishlist[index];

        // SET QUANTITY
        product.quantity = 1;

        // ADD TO CART
        cartItems.push(product);
        localStorage.setItem("cart", JSON.stringify(cartItems));

        // UPDATE CART COUNT
        $("#cartCount").html(cartItems.length);

        // REMOVE FROM WISHLIST
        wishlist.splice(index, 1);
        localStorage.setItem("wishlist", JSON.stringify(wishlist));

        // RELOAD WISHLIST
        LoadWishlist();

        alert(product.title + " Moved to Cart!");

    }


    // REMOVE FROM WISHLIST FUNCTION
    window.RemoveWishlist = function(index){

        wishlist.splice(index, 1);

        localStorage.setItem("wishlist", JSON.stringify(wishlist));

        LoadWishlist();

    }

});

</script>

</body>
</html>
