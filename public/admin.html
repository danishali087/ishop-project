<!DOCTYPE html>
<html lang="en">

<head>

    <title>Admin Panel</title>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="stylesheet"
          href="../node_modules/bootstrap/dist/css/bootstrap.css">

    <link rel="stylesheet"
          href="../node_modules/bootstrap-icons/font/bootstrap-icons.css">

    <script src="../node_modules/jquery/dist/jquery.js"></script>

    <style>

        body {
            background-color: #f0f2f5;
        }

        .sidebar {
            min-height: 100vh;
            background-color: #1a1a2e;
        }

        .nav-link {
            color: #adb5bd;
            padding: 10px 15px;
            border-radius: 8px;
            margin-bottom: 5px;
        }

        .nav-link:hover {
            background-color: #16213e;
            color: #ffc107;
        }

        .nav-link.active {
            background-color: #ffc107;
            color: #000;
        }

        .stat-card {
            border-radius: 12px;
            border: none;
        }

        .section {
            display: none;
        }

        .section.active {
            display: block;
        }

    </style>

</head>

<body>

<div class="container-fluid">

    <div class="row">


        <!-- SIDEBAR -->
        <div class="col-2 sidebar p-3">

            <h5 class="text-warning text-center mb-4 mt-2">
                <span class="bi bi-shield-lock"></span>
                Admin Panel
            </h5>

            <ul class="nav flex-column">

                <li class="nav-item">
                    <a class="nav-link active"
                       onclick="ShowSection('dashboard')"
                       style="cursor:pointer;">
                        <span class="bi bi-speedometer2"></span>
                        Dashboard
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link"
                       onclick="ShowSection('customers')"
                       style="cursor:pointer;">
                        <span class="bi bi-people"></span>
                        Customers
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link"
                       onclick="ShowSection('products')"
                       style="cursor:pointer;">
                        <span class="bi bi-box"></span>
                        Products
                    </a>
                </li>

                <li class="nav-item mt-4">
                    <button class="btn btn-danger w-100"
                            id="btnLogout">
                        <span class="bi bi-box-arrow-right"></span>
                        Logout
                    </button>
                </li>

            </ul>

        </div>


        <!-- MAIN CONTENT -->
        <div class="col-10 p-4">


            <!-- HEADER -->
            <div class="d-flex justify-content-between align-items-center mb-4">

                <h4>
                    <span id="pageTitle">Dashboard</span>
                </h4>

                <span class="text-muted">
                    <span class="bi bi-person-circle"></span>
                    Welcome : <strong id="adminName"></strong>
                </span>

            </div>


            <!-- DASHBOARD SECTION -->
            <div id="sectionDashboard" class="section active">

                <div class="row g-3 mb-4">

                    <!-- TOTAL CUSTOMERS -->
                    <div class="col-md-4">
                        <div class="card stat-card shadow text-white bg-primary">
                            <div class="card-body d-flex justify-content-between align-items-center">
                                <div>
                                    <h6>Total Customers</h6>
                                    <h2 id="statCustomers">0</h2>
                                </div>
                                <span class="bi bi-people fs-1"></span>
                            </div>
                        </div>
                    </div>

                    <!-- TOTAL PRODUCTS -->
                    <div class="col-md-4">
                        <div class="card stat-card shadow text-white bg-success">
                            <div class="card-body d-flex justify-content-between align-items-center">
                                <div>
                                    <h6>Total Products</h6>
                                    <h2 id="statProducts">0</h2>
                                </div>
                                <span class="bi bi-box fs-1"></span>
                            </div>
                        </div>
                    </div>

                    <!-- CART ITEMS -->
                    <div class="col-md-4">
                        <div class="card stat-card shadow text-white bg-warning">
                            <div class="card-body d-flex justify-content-between align-items-center">
                                <div>
                                    <h6>Cart Items</h6>
                                    <h2 id="statCart">0</h2>
                                </div>
                                <span class="bi bi-cart fs-1"></span>
                            </div>
                        </div>
                    </div>

                </div>

                <div class="card shadow">
                    <div class="card-body text-center py-5">
                        <h4 class="text-muted">
                            <span class="bi bi-graph-up"></span>
                            Welcome to Ishop Admin Panel
                        </h4>
                        <p class="text-muted">
                            Use the sidebar to manage customers and products
                        </p>
                    </div>
                </div>

            </div>


            <!-- CUSTOMERS SECTION -->
            <div id="sectionCustomers" class="section">

                <div class="card shadow">

                    <div class="card-header bg-dark text-white">
                        <h5>
                            <span class="bi bi-people"></span>
                            All Customers
                        </h5>
                    </div>

                    <div class="card-body">

                        <table class="table table-bordered table-hover">

                            <thead class="table-dark">
                                <tr>
                                    <th>User Id</th>
                                    <th>User Name</th>
                                    <th>Age</th>
                                    <th>Email</th>
                                    <th>Mobile</th>
                                    <th>Action</th>
                                </tr>
                            </thead>

                            <tbody id="tblCustomers">
                            </tbody>

                        </table>

                    </div>

                </div>

            </div>


            <!-- PRODUCTS SECTION -->
            <div id="sectionProducts" class="section">

                <div class="row" id="adminProducts">
                </div>

            </div>


        </div>


    </div>

</div>


<script>

$(function(){

    // CHECK ADMIN LOGIN
    if(localStorage.getItem("admin") == null){
        window.location.href = "admin-login.html";
    }

    // SHOW ADMIN NAME
    $("#adminName").html(localStorage.getItem("admin"));


    // LOAD STATS
    function LoadStats(){

        // LOAD CUSTOMER COUNT
        $.ajax({
            method: "GET",
            url: "http://localhost:4400/customers",
            success: function(customers){
                $("#statCustomers").html(customers.length);
            }
        });

        // LOAD PRODUCT COUNT
        $.ajax({
            method: "GET",
            url: "https://fakestoreapi.com/products",
            success: function(products){
                $("#statProducts").html(products.length);
            }
        });

        // CART ITEMS COUNT FROM LOCALSTORAGE
        var cart = JSON.parse(localStorage.getItem("cart") || "[]");
        $("#statCart").html(cart.length);

    }

    LoadStats();


    // LOAD CUSTOMERS FUNCTION
    function LoadCustomers(){

        $("#tblCustomers").html("");

        $.ajax({

            method: "GET",
            url: "http://localhost:4400/customers",

            success: function(customers){

                customers.forEach(function(customer){

                    var row = `
                        <tr>
                            <td>${customer.userid}</td>
                            <td>${customer.username}</td>
                            <td>${customer.age}</td>
                            <td>${customer.email}</td>
                            <td>${customer.mobile}</td>
                            <td>
                                <button class="btn btn-danger btn-sm"
                                        onclick="DeleteCustomer('${customer.userid}')">
                                    <span class="bi bi-trash"></span>
                                    Delete
                                </button>
                            </td>
                        </tr>
                    `;

                    $("#tblCustomers").append(row);

                });

            },

            error: function(){
                alert("Unable to load customers");
            }

        });

    }


    // LOAD PRODUCTS FUNCTION
    function LoadAdminProducts(){

        $("#adminProducts").html("");

        $.ajax({

            method: "GET",
            url: "https://fakestoreapi.com/products",

            success: function(products){

                products.forEach(function(product){

                    var card = `
                        <div class="col-md-3 mb-4">
                            <div class="card shadow h-100">
                                <img src="${product.image}"
                                     class="card-img-top p-3"
                                     style="height:150px; object-fit:contain;">
                                <div class="card-body">
                                    <h6>${product.title.substring(0,30)}...</h6>
                                    <p class="text-muted text-capitalize">
                                        ${product.category}
                                    </p>
                                    <h5 class="text-danger">₹ ${product.price}</h5>
                                    <p>⭐ ${product.rating.rate}</p>
                                </div>
                            </div>
                        </div>
                    `;

                    $("#adminProducts").append(card);

                });

            }

        });

    }


    // DELETE CUSTOMER FUNCTION
    window.DeleteCustomer = function(userid){

        var confirm = window.confirm("Are you sure you want to delete this customer?");

        if(!confirm){ return; }

        $.ajax({

            method: "DELETE",
            url: "http://localhost:4400/deletecustomer/" + userid,

            success: function(response){

                if(response.success){
                    alert("Customer Deleted!");
                    LoadCustomers();
                    LoadStats();
                } else {
                    alert(response.message);
                }

            }

        });

    }


    // SHOW SECTION FUNCTION
    window.ShowSection = function(section){

        // HIDE ALL SECTIONS
        $(".section").removeClass("active");
        $(".nav-link").removeClass("active");

        // SHOW SELECTED SECTION
        if(section == "dashboard"){
            $("#sectionDashboard").addClass("active");
            $("#pageTitle").html("Dashboard");
            LoadStats();
        }

        else if(section == "customers"){
            $("#sectionCustomers").addClass("active");
            $("#pageTitle").html("Customers");
            LoadCustomers();
        }

        else if(section == "products"){
            $("#sectionProducts").addClass("active");
            $("#pageTitle").html("Products");
            LoadAdminProducts();
        }

    }


    // LOGOUT
    $("#btnLogout").click(function(){
        localStorage.removeItem("admin");
        window.location.href = "admin-login.html";
    });

});

</script>

</body>
</html>
